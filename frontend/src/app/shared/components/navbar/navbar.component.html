<nav class="navbar">
  <a routerLink="/" class="logo">RateIt</a>

  <div class="nav-links">
    <a routerLink="/"         routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
    <a routerLink="/resenas"  routerLinkActive="active">Reseñas</a>
    <a routerLink="/empresas" routerLinkActive="active">Empresas</a>
  </div>

  <div class="nav-right">
    @if (auth.isLoggedIn()) {
      <div class="user-menu">
        <a routerLink="/cuenta" class="avatar" title="{{ auth.currentUser()?.nombre }}">
          {{ initials() }}
        </a>
        @if (auth.isAdmin()) {
          <span class="admin-badge">Admin</span>
        }
        <button class="logout-btn" (click)="auth.logout()" title="Cerrar sesión">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    }
  </div>
</nav>
